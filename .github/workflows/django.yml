#本番環境へデプロイ
name: Production Deploy

on:
  #mainブランチへプッシュされたら動作
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.5.3

      #FTP経由でファイルをサーバへ転送する
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: |
          exclude: |
            **/.**/**
            .editorconfig
            .gitignore
      #ここまでは成功
      
      # SSH 経由でコマンドを実行する
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          #passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd waripoke.xyz/public_html/

            # .env を作成
            cat << EOF > .env
            DJANGO_SETTINGS_MODULE=config.settings.config_prod
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            GOOGLE_APPLICATION_CREDENTIALS=${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
            EOF

            # 仮想環境を作成
            pipenv --python 3

            # Pipfile.lock からパッケージをインストール
            pipenv sync

            # DB マイグレーション
            pipenv run python manage.py migrate

            # static ファイルの収集
            pipenv run python manage.py collectstatic --noinput

            # デプロイ設定のチェック
            pipenv run python manage.py check --deploy

            # index.cgi を作成
            cat << EOF > index.cgi
            #!/usr/bin/env python3
            import os
            import sys
            import dotenv
            import pymysql

            # 仮想環境のパスを設定
            sys.path.insert(0, "/home/xs910683/.local/share/virtualenvs/xs910683-p6CVCTmS/lib/python3.9/site-packages")

            # .env ファイルから環境変数を読み込む
            dotenv.load_dotenv()

            # pymysqlをMySQLdbとして使用
            pymysql.install_as_MySQLdb()

            # Djangoアプリケーションの設定モジュールを指定
            os.environ['DJANGO_SETTINGS_MODULE'] = 'app_config.settings'

            # WSGIアプリケーションを読み込み
            from django.core.wsgi import get_wsgi_application
            application = get_wsgi_application()

            # CGIとして実行
            from wsgiref.handlers import CGIHandler
            from my_project.wsgi import application
            if __name__ == "__main__":
              CGIHandler().run(application)

            EOF

            # index.cgi のパーミッションを変更
            chmod 755 index.cgi








