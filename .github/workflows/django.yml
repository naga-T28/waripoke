# 本番環境へデプロイ
name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.5.3

      # FTP経由でファイルをサーバへ転送する
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: waripoke.xyz/public_html/
          exclude: |
            **/.**/**
            .editorconfig
            .gitignore

      # .env ディレクトリが存在しない場合に作成
      - name: Ensure .env Directory Exists
        run: mkdir -p waripoke.xyz/public_html

      # .env を作成
      - name: Create .env file
        run: |
          echo "DJANGO_SETTINGS_MODULE=config.settings.config_prod" > waripoke.xyz/public_html/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> waripoke.xyz/public_html/.env
          echo "DATABASE_HOST=${{ secrets.DATABASE_HOST }}" >> waripoke.xyz/public_html/.env
          echo "DATABASE_PORT=${{ secrets.DATABASE_PORT }}" >> waripoke.xyz/public_html/.env
          echo "DATABASE_NAME=${{ secrets.DATABASE_NAME_PROD }}" >> waripoke.xyz/public_html/.env
          echo "DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME_PROD }}" >> waripoke.xyz/public_html/.env
          echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD_PROD }}" >> waripoke.xyz/public_html/.env

      # 仮想環境を作成
      - name: Create Python Virtual Environment
        run: |
          pipenv --python 3

      # Pipfile.lock からパッケージをインストール
      - name: Install dependencies
        run: pipenv sync

      # DB マイグレーション
      - name: Database Migrate
        run: pipenv run python manage.py migrate

      # static ファイルの収集
      - name: Collect Static Files
        run: pipenv run python manage.py collectstatic --noinput

      # デプロイ設定のチェック
      - name: Check Deployment
        run: pipenv run python manage.py check --deploy


