# 本番環境へデプロイ
name: Production Deploy

on:
  # mainブランチへプッシュされたら動作
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.5.3

      # 仮想環境をセットアップして必要な処理を実行
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --deploy --ignore-pipfile

      # 必要な処理をローカルで実行する
      - name: Generate required files
        run: |
          # .env ファイルの作成
          cat << EOF > .env
          DJANGO_SETTINGS_MODULE=config.settings.config_prod
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DATABASE_HOST=${{ secrets.DATABASE_HOST }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME_PROD }}
          DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME_PROD }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD_PROD }}
          EOF

          # staticファイルを収集
          pipenv run python manage.py collectstatic --noinput

          # index.cgi ファイルの作成
          cat << EOF > index.cgi
          #!$(pipenv --venv)/bin/python
          import sys
          import dotenv
          import pymysql

          # pipenv のパスを追加
          sys.path.insert(0, "$(pipenv --venv)/bin")

          # .env ファイルから環境変数を読み込む
          dotenv.load_dotenv()

          # pymysql で MySQL を使えるようにする
          pymysql.install_as_MySQLdb()

          from wsgiref.handlers import CGIHandler
          from django.core.wsgi import get_wsgi_application

          # アプリケーションを起動
          application = get_wsgi_application()
          CGIHandler().run(application)
          EOF

          chmod 755 index.cgi

      # FTP経由でファイルをサーバーに転送する
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: waripoke.xyz/public_html/
          exclude: |
            **/.**/**
            .editorconfig
            .gitignore

